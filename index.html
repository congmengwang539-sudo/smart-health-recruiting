<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>智慧医疗招聘工作台</title>
<style>
:root{--ink:#172927;--muted:#71807e;--green:#126b5d;--dark:#183c37;--mint:#e8f1e5;--line:#e5e8e2;--bg:#f7f8f5}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,"Microsoft YaHei",sans-serif}.app{min-height:100vh;display:grid;grid-template-columns:230px 1fr}.side{position:sticky;top:0;height:100vh;background:var(--dark);color:#fff;padding:26px 18px;display:flex;flex-direction:column}.brand{display:flex;gap:11px;align-items:center;padding:0 8px 28px}.logo{width:36px;height:36px;border-radius:10px;background:#d9f36c;color:var(--dark);display:grid;place-items:center;font-size:20px}.brand b,.brand small{display:block}.brand small{color:#a9c1bd;font-size:11px;margin-top:3px;letter-spacing:2px}.nav{display:grid;gap:7px}.nav button{border:0;background:transparent;color:#bfd0cd;padding:12px;border-radius:10px;text-align:left;font-size:14px;cursor:pointer}.nav button.active{background:#2b504b;color:#fff}.nav i{display:inline-block;width:25px;font-style:normal}.goal{margin-top:auto;background:#244a44;border:1px solid #35605a;border-radius:14px;padding:15px}.goal span,.goal small{display:block;color:#b6cac7;font-size:11px}.goal b{display:block;margin:8px 0}.owner{border-top:1px solid #345651;margin-top:18px;padding-top:18px;font-size:12px}.main{padding:30px 34px 60px;min-width:0}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.top p{margin:0 0 5px;color:var(--muted);font-size:12px}.top h1{margin:0;font-size:25px}.actions{display:flex;gap:8px}.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:11px 15px;border-radius:10px;cursor:pointer;font-weight:bold}.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}.hero{background:var(--mint);border-radius:22px;padding:35px 40px;display:flex;justify-content:space-between;align-items:center}.eyebrow{color:var(--green);font-size:11px;font-weight:bold;letter-spacing:2px}.hero h2{font-size:29px;line-height:1.35;margin:13px 0 10px;font-weight:500}.hero h2 b{color:var(--green)}.hero p{color:#61726e;font-size:13px}.bubble{width:150px;height:150px;border-radius:50%;background:var(--dark);color:#fff;display:grid;place-content:center;text-align:center}.bubble b{font-size:43px}.bubble small{color:#bcd1cd}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:17px 0}.metric,.panel,.role,.candidate{background:#fff;border:1px solid var(--line);border-radius:15px}.metric{padding:20px}.metric span,.metric small{display:block;color:var(--muted);font-size:12px}.metric b{display:block;font-size:28px;margin:8px 0}.two{display:grid;grid-template-columns:1.35fr 1fr;gap:16px}.panel{padding:22px}.panel h3{margin:3px 0 18px}.funnel{display:grid;gap:12px}.funnel-row{display:grid;grid-template-columns:78px 1fr 24px;align-items:center;font-size:12px}.bar{height:9px;border-radius:0 8px 8px 0;background:#72a79a}.tasks{list-style:none;margin:0;padding:0}.tasks li{padding:13px 0;border-top:1px solid #edf0eb}.tasks b,.tasks span{display:block;font-size:13px}.tasks span{font-size:11px;color:var(--muted);margin-top:5px}.roles{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.role{padding:23px}.role-top{display:flex;justify-content:space-between}.priority{font-size:10px;padding:5px 9px;border-radius:20px;background:#fff0df;color:#a65c13}.priority.mid{background:#e7f2ed;color:#397462}.num{font-size:22px;color:#d3dad7;font-weight:bold}.role>p{font-size:11px;color:var(--muted);margin:16px 0 7px}.role h2{font-size:20px;margin:0 0 14px}.tags{display:flex;gap:7px;flex-wrap:wrap}.tags span{background:#f0f2ed;font-size:10px;padding:6px 8px;border-radius:6px}.focus{font-size:12px;color:#65736f;border-left:3px solid #b7d39c;padding-left:10px;margin:18px 0}.ints{display:grid;grid-template-columns:repeat(3,1fr);padding-top:14px;border-top:1px solid var(--line)}.ints div+div{border-left:1px solid var(--line);padding-left:13px}.ints small,.ints b{display:block;font-size:11px}.ints small{color:var(--muted);margin-bottom:5px}.toolbar{display:flex;gap:10px;margin-bottom:15px}.toolbar input,.toolbar select{background:#fff;border:1px solid var(--line);border-radius:10px;padding:11px 13px}.toolbar input{width:310px}.board{display:grid;grid-template-columns:repeat(6,minmax(190px,1fr));gap:12px;overflow-x:auto}.col{background:#eff1ed;border-radius:14px;padding:12px;min-height:490px}.col-head{display:flex;justify-content:space-between;padding:5px 4px 13px;font-size:12px}.col-head b{background:#dfe4de;border-radius:10px;padding:2px 7px}.candidate{padding:13px;margin-bottom:10px}.person{display:flex;gap:9px;align-items:center}.avatar{width:30px;height:30px;border-radius:8px;background:#dfeee8;display:grid;place-items:center;color:var(--green);font-weight:bold}.person b,.person small{display:block;font-size:12px}.person small{font-size:9px;color:var(--muted);margin-top:3px}.candidate p{font-size:11px;margin:12px 0 7px}.note{display:block;color:var(--muted);font-size:10px;line-height:1.5}.candidate select{width:100%;margin-top:12px;border:1px solid var(--line);border-radius:7px;padding:7px;background:#fafbf8}.empty{color:#8a9996;text-align:center;font-size:11px;padding:28px 5px}.overlay{position:fixed;inset:0;background:#102b2869;display:none;place-items:center;padding:20px;z-index:20}.overlay.show{display:grid}.modal{width:min(520px,100%);background:#fff;border-radius:20px;padding:28px;position:relative}.close{position:absolute;right:18px;top:14px;border:0;background:none;font-size:25px;cursor:pointer}.modal h2{margin:9px 0 22px}.modal label{display:grid;gap:7px;font-size:12px;margin-bottom:14px}.modal input,.modal select,.modal textarea{border:1px solid #dfe5df;border-radius:9px;padding:11px;font:inherit}.modal textarea{min-height:80px}.formrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}.hidden{display:none!important}.file{display:none}.hint{position:fixed;right:18px;bottom:18px;background:#173f39;color:#fff;padding:12px 16px;border-radius:10px;font-size:12px;display:none;z-index:30}@media(max-width:900px){.app{grid-template-columns:74px 1fr}.side{padding:22px 10px}.brand div,.nav button{font-size:0}.nav button i{font-size:18px;text-align:center}.goal,.owner{display:none}.main{padding:24px 18px}.metrics{grid-template-columns:1fr 1fr}.two,.roles{grid-template-columns:1fr}}@media(max-width:600px){.app{display:block}.side{position:fixed;z-index:10;top:auto;bottom:0;width:100%;height:64px;padding:7px}.brand,.goal,.owner{display:none}.nav{grid-template-columns:repeat(3,1fr)}.nav button{font-size:11px;text-align:center}.nav button i{display:block;width:auto}.main{padding:20px 14px 85px}.actions .secondary{display:none}.hero{padding:25px}.bubble{display:none}.hero h2{font-size:23px}.metrics{grid-template-columns:1fr 1fr}.top .primary{font-size:0}.top .primary:before{content:"＋";font-size:18px}.formrow{grid-template-columns:1fr}}
.edit-role{border:1px solid var(--line);background:#fff;color:var(--green);padding:7px 10px;border-radius:8px;font-size:11px;cursor:pointer}.role-actions{display:flex;align-items:center;gap:9px}.role-modal{width:min(620px,100%);max-height:90vh;overflow:auto}.role-modal .formrow.three{grid-template-columns:repeat(3,1fr)}.roles{display:block}.department{margin-bottom:26px}.department-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 10px;border-bottom:1px solid #dbe4df}.department-head h2{font-size:15px;margin:0;background:#dfeee8;color:#185d52;padding:8px 13px;border-radius:10px}.department-head span{font-size:11px;color:var(--muted);background:#f0f3ef;padding:7px 10px;border-radius:9px}.department-list{background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--line)}.role{border:0;border-bottom:1px solid var(--line);border-radius:0;padding:20px 22px;display:grid;grid-template-columns:minmax(280px,1.4fr) minmax(420px,1fr);gap:28px;align-items:center}.role:last-child{border-bottom:0}.role-main{min-width:0}.role-main .role-top{justify-content:flex-start;gap:10px;align-items:center}.role-main>p{font-size:11px;color:var(--muted);margin:9px 0 4px}.role-main h2{font-size:18px;margin:0 0 10px}.role-main .focus{margin:12px 0 0}.role-side{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}.role-side .ints{padding:0;border:0}.role-side .num{min-width:30px}.role-side .role-actions{justify-content:flex-end;margin-top:10px}@media(max-width:950px){.role{grid-template-columns:1fr}.role-side{grid-template-columns:1fr auto}.role-side .role-actions{margin-top:0}}@media(max-width:600px){.role-modal .formrow.three{grid-template-columns:1fr}.role{padding:18px 15px;gap:15px}.role-side{grid-template-columns:1fr}.role-side .num{display:none}.department-head{padding-left:0;padding-right:0}}
</style>
</head>
<body>
<div class="app">
 <aside class="side"><div class="brand"><span class="logo">✦</span><div><b>智慧医疗</b><small>招聘工作台</small></div></div><nav class="nav"><button data-view="roles"><i>▦</i> 招聘岗位</button><button data-view="candidates"><i>◎</i> 候选人</button><button class="active" data-view="dashboard"><i>⌂</i> 工作概览</button></nav><div class="goal"><span>招聘目标</span><b id="goalText">5个岗位 · 5人</b><small>岗位需求可随时编辑</small></div><div class="owner">● 招聘负责人<br><span style="color:#a9c1bd">智慧医疗业务部</span></div></aside>
 <main class="main"><header class="top"><div><p>智慧医疗业务部 · 在线版</p><h1 id="title">招聘工作概览</h1></div><div class="actions"><button class="btn secondary" onclick="exportData()">导出备份</button><button class="btn secondary" onclick="document.getElementById('importFile').click()">导入备份</button><input class="file" id="importFile" type="file" accept="application/json"><button class="btn primary" onclick="openModal()">＋ 新增候选人</button></div></header>
 <section id="dashboard"><div class="metrics" id="metrics"></div><div class="two"><section class="panel"><span class="eyebrow">招聘漏斗</span><h3>候选人进展</h3><div class="funnel" id="funnel"></div></section><section class="panel"><span class="eyebrow">本周关注</span><h3>优先推进事项</h3><ul class="tasks"><li><b>补充核心岗位候选人</b><span>产品运营、解决方案、Java交付</span></li><li><b>校准岗位筛选口径</b><span>将硬性条件与加分项分开</span></li><li><b>建立候选人周复盘</b><span>每周跟进停滞阶段与下一步</span></li></ul></section></div></section>
 <section id="roles" class="hidden"><div class="roles" id="roleGrid"></div></section>
 <section id="candidates" class="hidden"><div class="toolbar"><input id="search" placeholder="搜索候选人、岗位或来源"><select id="roleFilter"><option>全部岗位</option></select></div><div class="board" id="board"></div></section>
 </main>
</div>
<div class="overlay" id="overlay" onclick="closeModal(event)"><form class="modal" id="form" onclick="event.stopPropagation()"><button type="button" class="close" onclick="closeModal()">×</button><span class="eyebrow">候选人档案</span><h2>新增候选人</h2><label>姓名<input name="name" required placeholder="请输入候选人姓名"></label><label>应聘岗位<select name="role" id="formRole"></select></label><div class="formrow"><label>当前阶段<select name="stage" id="formStage"></select></label><label>候选人来源<select name="source"><option>Boss直聘</option><option>内推</option><option>猎聘</option><option>猎头</option><option>其他</option></select></label></div><label>跟进备注<textarea name="note" placeholder="记录亮点、风险或下一步安排"></textarea></label><button class="btn primary" style="width:100%">保存候选人</button></form></div>
<div class="overlay" id="roleOverlay" onclick="closeRoleModal(event)"><form class="modal role-modal" id="roleForm" onclick="event.stopPropagation()"><button type="button" class="close" onclick="closeRoleModal()">×</button><span class="eyebrow">岗位需求</span><h2>编辑岗位</h2><input type="hidden" name="id"><input type="hidden" name="oldName"><label>岗位名称<input name="name" required></label><div class="formrow"><label>所属业务组<input name="group" required></label><label>工作地点<input name="location" required></label></div><div class="formrow three"><label>职级<input name="level" required></label><label>招聘人数<input name="headcount" type="number" min="1" required></label><label>优先级<select name="priority"><option>高</option><option>中</option><option>低</option></select></label></div><div class="formrow"><label>招聘负责人<input name="owner" required></label><label>一面面试官<input name="i1" required></label></div><label>二面面试官<input name="i2" required></label><label>核心要求 / 关键词<textarea name="focus" required></textarea></label><button class="btn primary" style="width:100%">保存岗位修改</button></form></div><div class="hint" id="hint"></div>
<script>
const defaultRoles=[
{id:'role-1',name:'产品运营',group:'减重营养组',level:'P5–P6',location:'北京',i1:'一姝',i2:'尹川',priority:'高',headcount:1,owner:'我',focus:'产品运营 · 数据分析 · 医疗健康'},
{id:'role-2',name:'产品解决方案岗',group:'减重营养组',level:'P6',location:'北京',i1:'一姝',i2:'尹川',priority:'高',headcount:1,owner:'我',focus:'方案设计 · 医院项目 · 体重管理'},
{id:'role-3',name:'客户经理（京津冀）',group:'减重营养组',level:'P5–P6',location:'京津冀',i1:'一姝',i2:'尹川',priority:'中',headcount:1,owner:'我',focus:'医院运营 · 患者服务 · 高频出差'},
{id:'role-4',name:'Java交付工程师',group:'技术产品组',level:'P5–P6',location:'北京',i1:'赵立伟',i2:'尹川',priority:'高',headcount:1,owner:'我',focus:'Java · 医疗信息化 · 项目交付'},
{id:'role-5',name:'客户经理（医院拓展）',group:'医院拓展组',level:'P5–P6',location:'广东 / 福建',i1:'袁涛',i2:'楚楚',priority:'中',headcount:1,owner:'我',focus:'三甲医院资源 · 商务拓展 · 出差'}];
const stages=['待沟通','简历筛选','一面','二面','Offer','已入职'];
const KEY='smart-health-recruiting-offline-v1',ROLE_KEY='smart-health-recruiting-roles-v1';
let roles=JSON.parse(localStorage.getItem(ROLE_KEY)||'null')||defaultRoles;
roles=roles.map(r=>r.id==='role-1'||r.id==='role-2'||r.id==='role-3'?{...r,group:r.group==='减重招聘'?'减重营养组':r.group}:r.id==='role-4'?{...r,group:r.group==='交付组'?'技术产品组':r.group}:r);
let candidates=JSON.parse(localStorage.getItem(KEY)||'[]');
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function save(){localStorage.setItem(KEY,JSON.stringify(candidates));localStorage.setItem(ROLE_KEY,JSON.stringify(roles));render()}
function counts(){return Object.fromEntries(stages.map(s=>[s,candidates.filter(c=>c.stage===s).length]))}
function render(){const c=counts(),total=roles.reduce((n,r)=>n+(Number(r.headcount)||1),0);goalText.textContent=roles.length+'个岗位 · '+total+'人';metrics.innerHTML=`<article class="metric"><span>招聘岗位</span><b>${roles.length}</b><small>需求人数 ${total} 人</small></article><article class="metric"><span>流程中候选人</span><b>${candidates.filter(x=>x.stage!=='已入职').length}</b><small>覆盖 ${new Set(candidates.map(x=>x.role)).size} 个岗位</small></article><article class="metric"><span>待面试</span><b>${c['一面']+c['二面']}</b><small>一面 ${c['一面']} · 二面 ${c['二面']}</small></article><article class="metric"><span>Offer / 入职</span><b>${c['Offer']+c['已入职']}</b><small>目标完成 ${Math.round(c['已入职']/Math.max(total,1)*100)}%</small></article>`;funnel.innerHTML=stages.slice(0,5).map((s,i)=>`<div class="funnel-row"><span>${s}</span><i class="bar" style="width:${Math.max(8,100-i*17)}%"></i><b>${c[s]}</b></div>`).join('');renderRoles();renderBoard()}
function renderRoles(){const groups=[...new Set(roles.map(r=>r.group))];let index=0;roleGrid.innerHTML=groups.map(group=>{const items=roles.filter(r=>r.group===group);return `<section class="department"><header class="department-head"><h2>${esc(group)}</h2><span>${items.length} 个岗位 · 招聘 ${items.reduce((n,r)=>n+(Number(r.headcount)||1),0)} 人</span></header><div class="department-list">${items.map(r=>{index++;return `<article class="role"><div class="role-main"><div class="role-top"><span class="priority ${r.priority==='中'?'mid':''}">${r.priority}优先级</span><span>${esc(r.location)}</span></div><p>${esc(r.level)} · 招聘 ${r.headcount||1} 人 · 负责人：${esc(r.owner||'我')}</p><h2>${esc(r.name)}</h2><div class="focus">${esc(r.focus)}</div></div><div class="role-side"><div class="ints"><div><small>一面</small><b>${esc(r.i1)}</b></div><div><small>二面</small><b>${esc(r.i2)}</b></div><div><small>候选人</small><b>${candidates.filter(c=>c.role===r.name).length} 人</b></div></div><div><span class="num">${String(index).padStart(2,'0')}</span><div class="role-actions"><button class="edit-role" onclick="openRoleModal('${r.id}')">编辑岗位</button></div></div></div></article>`}).join('')}</div></section>`}).join('')}
function renderBoard(){const q=document.getElementById('search').value||'',rf=roleFilter.value||'全部岗位';const list=candidates.filter(c=>(rf==='全部岗位'||c.role===rf)&&(`${c.name}${c.role}${c.source}`.includes(q)));board.innerHTML=stages.map(s=>{const items=list.filter(c=>c.stage===s);return `<section class="col"><div class="col-head"><span>${s}</span><b>${items.length}</b></div>${items.length?items.map(c=>`<article class="candidate"><div class="person"><span class="avatar">${esc(c.name).slice(0,1)}</span><div><b>${esc(c.name)}</b><small>${esc(c.source)} · ${esc(c.date)}</small></div></div><p>${esc(c.role)}</p>${c.note?`<small class="note">${esc(c.note)}</small>`:''}<select onchange="move(${c.id},this.value)">${stages.map(x=>`<option ${x===c.stage?'selected':''}>${x}</option>`).join('')}</select><button onclick="removeCandidate(${c.id})" style="border:0;background:none;color:#a76a61;font-size:10px;margin-top:10px;cursor:pointer">删除档案</button></article>`).join(''):'<div class="empty">暂无候选人</div>'}</section>`}).join('')}
function move(id,stage){candidates=candidates.map(c=>c.id===id?{...c,stage}:c);save()}
function removeCandidate(id){if(confirm('确定删除这位候选人的档案吗？')){candidates=candidates.filter(c=>c.id!==id);save()}}
function openModal(){overlay.classList.add('show')}
function closeModal(e){if(!e||e.target===overlay)overlay.classList.remove('show')}
function openRoleModal(id){const r=roles.find(x=>x.id===id);if(!r)return;Object.entries(r).forEach(([k,v])=>{if(roleForm.elements[k])roleForm.elements[k].value=v});roleForm.elements.oldName.value=r.name;roleOverlay.classList.add('show')}
function closeRoleModal(e){if(!e||e.target===roleOverlay)roleOverlay.classList.remove('show')}
function toast(t){hint.textContent=t;hint.style.display='block';setTimeout(()=>hint.style.display='none',2200)}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');['dashboard','roles','candidates'].forEach(v=>document.getElementById(v).classList.toggle('hidden',v!==b.dataset.view));title.textContent={dashboard:'招聘工作概览',roles:'招聘岗位',candidates:'候选人管理'}[b.dataset.view]});
function syncRoleOptions(){const selected=roleFilter.value;formRole.innerHTML=roles.map(r=>`<option>${esc(r.name)}</option>`).join('');roleFilter.innerHTML='<option>全部岗位</option>'+roles.map(r=>`<option>${esc(r.name)}</option>`).join('');if([...roleFilter.options].some(o=>o.value===selected))roleFilter.value=selected}
syncRoleOptions();formStage.innerHTML=stages.map(s=>`<option>${s}</option>`).join('');
form.onsubmit=e=>{e.preventDefault();const f=new FormData(form);candidates.unshift({id:Date.now(),name:f.get('name'),role:f.get('role'),stage:f.get('stage'),source:f.get('source'),date:new Date().toISOString().slice(0,10),note:f.get('note')});form.reset();overlay.classList.remove('show');save();toast('候选人已保存到本机')};
roleForm.onsubmit=e=>{e.preventDefault();const f=new FormData(roleForm),id=f.get('id'),oldName=f.get('oldName'),newName=String(f.get('name')).trim();roles=roles.map(r=>r.id===id?{...r,name:newName,group:String(f.get('group')).trim(),location:String(f.get('location')).trim(),level:String(f.get('level')).trim(),headcount:Number(f.get('headcount'))||1,priority:f.get('priority'),owner:String(f.get('owner')).trim(),i1:String(f.get('i1')).trim(),i2:String(f.get('i2')).trim(),focus:String(f.get('focus')).trim()}:r);if(oldName!==newName)candidates=candidates.map(c=>c.role===oldName?{...c,role:newName}:c);roleOverlay.classList.remove('show');syncRoleOptions();save();toast('岗位需求已保存')};
search.oninput=renderBoard;roleFilter.onchange=renderBoard;
function exportData(){const blob=new Blob([JSON.stringify({version:2,exportedAt:new Date().toISOString(),roles,candidates},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='智慧医疗招聘数据备份-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);toast('岗位与候选人备份已导出')}
importFile.onchange=async()=>{try{const data=JSON.parse(await importFile.files[0].text());if(!Array.isArray(data.candidates))throw 0;if(confirm('导入会替换当前岗位和候选人数据，是否继续？')){candidates=data.candidates;if(Array.isArray(data.roles))roles=data.roles;syncRoleOptions();save();toast('备份数据已导入')}}catch(e){alert('这不是有效的招聘工作台备份文件')}importFile.value=''};
render();
</script>
</body></html>
